name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SCP
        run: |
          # 1. Jo folders/files aapko explicitly delete karne hain wo hatayein
          rm -rf .git .github etc logs mail public_ftp ssl tmp access-logs etc.zip santaclauz_web.zip
          
          # 2. Themes aur plugins ke andar se saari images dhoondh kar GitHub Runner par delete karein (Server par delete NAHI hongi)
          find themes plugins -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.svg" -o -iname "*.webp" \) -delete
          
          # 3. Bina images wale themes aur plugins ko cPanel ke wp-content folder me bhej dein
          scp -v -q -r themes plugins ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/wp-content/
