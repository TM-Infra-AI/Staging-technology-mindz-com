name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Tarball and SCP
        run: |
          # 1. Runner par faltu files clean karein
          rm -rf .git .github etc logs mail public_ftp ssl tmp access-logs etc.zip santaclauz_web.zip
          
          # 2. Themes aur plugins ka 1 Zip (tar) file banayein, aur images ko exclude kar dein
          tar -czvf deploy_pack.tar.gz --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.svg' --exclude='*.webp' themes plugins
          
          # 3. SCP se sirf us ek file ko server par bhejein (Ye bahot fast hoga!)
          scp -q deploy_pack.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/
          
          # 4. SSH se server par jao, wp-content me unzip karo, aur zip file ko server se delete kar do
          ssh -q ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "tar -xzf ~/public_html/deploy_pack.tar.gz -C ~/public_html/wp-content/ && rm ~/public_html/deploy_pack.tar.gz"
