name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        run: |
          # 1. GitHub Runner se faltu files/folders clean karna
          rm -rf .git .github etc logs mail public_ftp ssl tmp access-logs etc.zip santaclauz_web.zip
          
          # 2. Super-fast Rsync chalana (Images ko skip karega aur SSH ko shant rakhega)
          rsync -avz --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.svg' --exclude='*.webp' -e "ssh -q" themes plugins ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/wp-content/
